name: Delete Release

on:
  release:
    types:
      - deleted

# Disable permissions for all available scopes by default.
# Any needed permissions should be configured at the job level.
permissions: {}

jobs:
  delete:
    name: On Delete Release
    runs-on: ubuntu-latest
    if: ${{ github.repository == 'newfold-labs/wp-plugin-web' }}
    timeout-minutes: 10
    permissions: {} # Purge step calls Cloudflare only; GITHUB_TOKEN is unused.
    steps:

      - name: Clear cache for release API
        run: |
          curl -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
               -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
               -H "Content-Type: application/json" \
               --data '{"files":["https://hiive.cloud/workers/release-api/plugins/newfold-labs/wp-plugin-web"]}'
