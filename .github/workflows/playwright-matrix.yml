name: Playwright Test Matrix

on:
  pull_request:
    types: [ opened, synchronize, reopened, ready_for_review ]
    # branches:
    #   - 'main'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

# Disable permissions for all available scopes by default.
# Any needed permissions should be configured at the job level.
permissions: {}

jobs:
  # Lightweight gate: skip full matrix on Dependabot PRs that don't touch newfold-labs packages.
  should-run-matrix:
    name: Check if matrix should run
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      run_matrix: ${{ steps.check.outputs.run_matrix }}
    permissions:
      contents: read

    steps:
      - name: Decide whether to run matrix
        id: check
        env:
          EVENT_NAME: ${{ github.event_name }}
          ACTOR: ${{ github.actor }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          # Manual run or non-PR: always run
          if [ "$EVENT_NAME" != "pull_request" ]; then
            echo "run_matrix=true" >> "$GITHUB_OUTPUT"
            echo "Not a PR event; running matrix."
            exit 0
          fi
          # Not Dependabot: always run
          if [ "$ACTOR" != "dependabot[bot]" ]; then
            echo "run_matrix=true" >> "$GITHUB_OUTPUT"
            echo "Not Dependabot; running matrix."
            exit 0
          fi
          # Dependabot PR: only run if newfold-labs is involved (title or branch)
          if echo "$PR_TITLE $PR_HEAD_REF" | grep -qi 'newfold-labs'; then
            echo "run_matrix=true" >> "$GITHUB_OUTPUT"
            echo "Dependabot PR touches newfold-labs; running matrix."
          else
            echo "run_matrix=false" >> "$GITHUB_OUTPUT"
            echo "Dependabot PR does not touch newfold-labs; skipping matrix."
          fi

  test:
    name: Playwright Test Matrix
    runs-on: ubuntu-latest
    timeout-minutes: 80
    needs: should-run-matrix
    if: needs.should-run-matrix.outputs.run_matrix == 'true'
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        phpVersion:
          - '7.4'
          - '8.0'
          - '8.1'
          - '8.2'
          - '8.3'
          - '8.4'
        wpVersion:
          - '6.8'
          - '6.9'
          - '7.0'

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240  # v2.37.2
        with:
          php-version: '8.3'
          coverage: none
          tools: composer, cs2pr

      - name: Use Node.js 24.x
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 24.15.0
          cache: 'npm'

      - name: Show versions
        run: |
          php --version
          composer --version
          node --version
          npm --version

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer vendor directory
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}

      - name: Setup workflow context
        id: workflow
        working-directory: ${{ runner.temp }}
        env:
          REPO: ${{ github.repository }}
        run: |
          mkdir dist
          echo "DIST=${PWD}/dist" >> "$GITHUB_OUTPUT"
          echo "PACKAGE=${REPO##*/}" >> "$GITHUB_OUTPUT"

      - name: Validate composer.json and composer.lock
        run: composer validate

      - name: Install PHP Dependencies
        run: composer install --no-progress --no-dev --optimize-autoloader --prefer-source

      - name: NPM Install
        run: npm install --legacy-peer-deps

      - name: Build JavaScript
        run: npm run build

      - name: Create Distribution Copy
        env:
          DIST: ${{ steps.workflow.outputs.DIST }}
          PACKAGE: ${{ steps.workflow.outputs.PACKAGE }}
        run: rsync -r --include-from=.distinclude --exclude-from=.distignore . "$DIST/$PACKAGE"

      - name: List Distribution Files
        working-directory: ${{ steps.workflow.outputs.DIST }}
        run: find .

      - name: Configure WordPress
        env:
          DIST: ${{ steps.workflow.outputs.DIST }}
          PACKAGE: ${{ steps.workflow.outputs.PACKAGE }}
        run: |
          jq -n \
            --arg core "WordPress/WordPress#tags/${{ matrix.wpVersion }}" \
            --arg phpVersion "${{ matrix.phpVersion }}" \
            --arg plugin "$DIST/$PACKAGE" \
            '{core: $core, phpVersion: $phpVersion, plugins: [$plugin]}' \
            > .wp-env.override.json

      - name: Install WordPress
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60  # v4.0.0
        with:
          timeout_minutes: 4
          max_attempts: 3
          command: |
            pwd
            ls -la .wp-env*
            npx wp-env start --debug
            npx wp-env run cli wp core version

      - name: Verify WordPress is ready
        run: |
          echo "Verifying WordPress is ready..."
          pwd
          ls -la .wp-env*
          npx wp-env run cli wp core version
          echo "WordPress is ready!"

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright Tests
        run: npx playwright test --reporter=line,json,github
        env:
          CI: true
          PLAYWRIGHT_JSON_OUTPUT_FILE: tests/playwright/test-results/github-summary-source.json

      - name: Add Playwright results to job summary
        if: always()
        env:
          MATRIX_WP: ${{ matrix.wpVersion }}
          MATRIX_PHP: ${{ matrix.phpVersion }}
          PLAYWRIGHT_JSON_OUTPUT_FILE: tests/playwright/test-results/github-summary-source.json
        run: node .github/scripts/playwright-job-summary.mjs

      - name: Store Playwright test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: playwright-report-wp${{ matrix.wpVersion }}-php${{ matrix.phpVersion }}
          path: tests/playwright/test-results/
          retention-days: 10

      - name: Output debug.log file contents
        if: always()
        continue-on-error: true
        run: |
          npx wp-env run wordpress cat /var/www/html/wp-content/debug.log

      - name: Output wordpress docker logs
        if: always()
        continue-on-error: true
        run: |
          npx wp-env logs --watch=false --debug=true

  matrix-summary:
    name: Playwright Matrix Summary
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - test
    if: ${{ always() && needs.test.result != 'skipped' }}
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Download all Playwright matrix artifacts
        if: always()
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: playwright-report-wp*-php*
          path: matrix-results
          merge-multiple: false

      - name: Add consolidated matrix summary
        if: always()
        env:
          PLAYWRIGHT_MATRIX_RESULTS_DIR: matrix-results
        run: node .github/scripts/playwright-matrix-summary.mjs
